name: Documentation problem
description: Tell us what is missing, unclear, incorrect, or out of date in the project guides.
title: ""
labels:
  - documentation
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the guides. Please do not include private category data or account information in your example.

  - type: input
    id: location
    attributes:
      label: Where is the problem?
      description: Link the page or name the README section, help text, or other guide.
      placeholder: URL or section name
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is unclear or incorrect?
      description: Explain what you expected to learn and what made the current wording difficult to use.
    validations:
      required: true

  - type: textarea
    id: suggested_change
    attributes:
      label: What should it say instead?
      description: A suggested correction or example is helpful, but it does not need to be final wording.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else that may help
      description: Optional. Add a cleaned-up example, screenshot, or related link. Remove private information first.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same documentation problem.
          required: true
        - label: I removed passwords, tokens, personal information, and private category data from anything shared here.
          required: true
