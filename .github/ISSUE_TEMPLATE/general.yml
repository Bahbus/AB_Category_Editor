name: Ask a question or report something else
description: Use this when none of the other choices fit your question or problem.
title: ""
labels:
  - question
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for getting in touch. Do not post passwords, tokens, personal information, private category data, or security details in a public issue. Use the private security link in the issue chooser for a security problem.

  - type: textarea
    id: summary
    attributes:
      label: How can we help?
      description: Describe your question or problem and the result you want.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: What happened or what have you tried?
      description: Share the steps, current behavior, or documentation you already checked when relevant.
    validations:
      required: true

  - type: input
    id: app_source
    attributes:
      label: Which editor did you use, if relevant?
      description: Tell us whether you used the published website or a local copy.
      placeholder: Published website, local commit, or not applicable

  - type: input
    id: environment
    attributes:
      label: Browser and operating system, if relevant
      placeholder: Firefox 140 on Windows 11, or not applicable

  - type: textarea
    id: evidence
    attributes:
      label: Anything else that may help
      description: Add a cleaned-up example, screenshot, console message, or link. Remove private and unrelated information first.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same question or problem.
          required: true
        - label: I removed passwords, tokens, personal information, private category data, and security details from anything shared here.
          required: true
