name: Check JavaScript

on:
  push:
  pull_request:

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run node --check on JavaScript files
        run: |
          find . -path './.git' -prune -o -name '*.js' -print0 | xargs -0 -r -n1 node --check
      - name: Check relative module imports
        run: node scripts/check-imports.mjs
      - name: Run tests
        run: node --test
