name: Static checks

on:
  push:
  pull_request:

jobs:
  javascript-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: |
          find . -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check
      - name: Check relative module imports
        run: node scripts/check-imports.mjs
      - name: Run tests
        run: node --test
